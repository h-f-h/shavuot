<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שבועות בצפת - התארגנות משפחתית</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Assistant', 'sans-serif'],
                    },
                    colors: {
                        purple: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                        },
                    },
                },
            },
        };
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-in {
            animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body {
            background: linear-gradient(135deg, #F8F7FF 0%, #F1EFFF 100%);
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.1);
        }
        .purple-gradient {
            background: linear-gradient(135deg, #8B5CF6 0%, #6366F1 100%);
        }
        .tab-island {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Babel for JSX support -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { 
            getFirestore, 
            collection, 
            doc, 
            onSnapshot, 
            addDoc, 
            deleteDoc, 
            updateDoc,
            query,
            orderBy
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { 
            getAuth, 
            signInAnonymously, 
            onAuthStateChanged 
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import * as Lucide from 'https://esm.sh/lucide-react@0.263.1';

        // ==========================================
        // PASTE YOUR FIREBASE CONFIG HERE
        // ==========================================
        const firebaseConfig = {
          apiKey: "AIzaSyAkCWLpA79nxRPGLhI4dplAdcbr-WvY6w0",
          authDomain: "shavuot-ef69f.firebaseapp.com",
          projectId: "shavuot-ef69f",
          storageBucket: "shavuot-ef69f.firebasestorage.app",
          messagingSenderId: "773434763467",
          appId: "1:773434763467:web:0594610387d6118cab534e",
          measurementId: "G-LK9NV4ERS5"
        };
        // ==========================================

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const MEALS = [
            { id: 'shavuot_eve', name: 'ערב שבועות', icon: '✨' },
            { id: 'shavuot_day', name: 'יום שבועות', icon: '🥛' },
            { id: 'shabbat_eve', name: 'ערב שבת', icon: '🕯️' },
            { id: 'shabbat_day', name: 'שבת ביום', icon: '🍷' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('meals');
            const [selectedMeal, setSelectedMeal] = useState(MEALS[0].id);
            const [cookFilter, setCookFilter] = useState(null);
            
            const [mealsData, setMealsData] = useState([]);
            const [recipes, setRecipes] = useState([]);
            const [shoppingList, setShoppingList] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [bringList, setBringList] = useState([]);

            const { 
                Utensils, ShoppingCart, Users, Plus, Trash2, CheckCircle2, 
                Clock, BookOpen, Sparkles, CalendarDays, PackageCheck, ChefHat, Heart, Smile
            } = Lucide;

            useEffect(() => {
                const unsub = onAuthStateChanged(auth, (u) => {
                    if (u) setUser(u);
                    else signInAnonymously(auth).catch(console.error);
                });
                return unsub;
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubscribes = [
                    onSnapshot(collection(db, 'meals'), (s) => setMealsData(s.docs.map(d => ({ id: d.id, ...d.data() })))),
                    onSnapshot(collection(db, 'recipes'), (s) => setRecipes(s.docs.map(d => ({ id: d.id, ...d.data() })))),
                    onSnapshot(collection(db, 'shopping'), (s) => setShoppingList(s.docs.map(d => ({ id: d.id, ...d.data() })))),
                    onSnapshot(collection(db, 'tasks'), (s) => setTasks(s.docs.map(d => ({ id: d.id, ...d.data() })))),
                    onSnapshot(collection(db, 'bring'), (s) => setBringList(s.docs.map(d => ({ id: d.id, ...d.data() }))))
                ];
                return () => unsubscribes.forEach(unsub => unsub());
            }, [user]);

            const addItem = async (coll, data) => {
                await addDoc(collection(db, coll), data);
            };

            const deleteItem = async (coll, id) => {
                await deleteDoc(doc(db, coll, id));
            };

            const toggleItem = async (coll, id, status) => {
                await updateDoc(doc(db, coll, id), { completed: !status });
            };

            const TabButton = ({ id, label, icon: Icon }) => (
                <button
                    onClick={() => setActiveTab(id)}
                    className={`flex flex-col items-center justify-center py-2 flex-1 transition-all duration-300 relative ${
                        activeTab === id ? 'text-purple-700' : 'text-purple-300'
                    }`}
                >
                    <div className={`p-2 rounded-2xl transition-all duration-300 ${activeTab === id ? 'bg-purple-100 text-purple-700' : ''}`}>
                        <Icon size={20} />
                    </div>
                    <span className="text-[10px] mt-1 font-bold whitespace-nowrap">{label}</span>
                </button>
            );

            return (
                <div className="min-h-screen text-right font-sans pb-32" dir="rtl">
                    {/* Floating Emojis Background Decor */}
                    <div className="fixed inset-0 pointer-events-none opacity-20 overflow-hidden z-0">
                        <div className="absolute top-20 left-10 text-4xl animate-float">🧀</div>
                        <div className="absolute bottom-40 right-10 text-4xl animate-float" style={{animationDelay: '1s'}}>🥐</div>
                        <div className="absolute top-1/2 left-5 text-3xl animate-float" style={{animationDelay: '2s'}}>🫐</div>
                        <div className="absolute top-1/3 right-1/4 text-5xl animate-float" style={{animationDelay: '1.5s'}}>🥛</div>
                    </div>

                    {/* Header */}
                    <header className="bg-white/70 backdrop-blur-xl shadow-sm sticky top-0 z-20 border-b border-purple-100/50 px-6 py-5">
                        <div className="max-w-xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div className="purple-gradient p-3 rounded-[1.5rem] text-white shadow-lg shadow-purple-200 animate-float">
                                    <ChefHat size={24} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black text-purple-950 tracking-tight leading-none">שבועות בצפת 🍇</h1>
                                    <div className="flex items-center gap-1.5 text-[11px] text-purple-400 font-bold uppercase tracking-wider mt-1">
                                        <Heart size={10} className="text-pink-400" />
                                        <span>התארגנות משפחתית • תשפ"ו</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto p-5 relative z-10">
                        
                        {activeTab === 'meals' && (
                            <div className="animate-in space-y-6">
                                <div className="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
                                    {MEALS.map(meal => (
                                        <button
                                            key={meal.id}
                                            onClick={() => setSelectedMeal(meal.id)}
                                            className={`px-6 py-3 rounded-[1.2rem] whitespace-nowrap text-sm font-bold transition-all duration-300 ${
                                                selectedMeal === meal.id 
                                                    ? 'purple-gradient text-white shadow-xl shadow-purple-200 scale-105' 
                                                    : 'bg-white text-purple-400 border border-purple-100 hover:border-purple-200'
                                            }`}
                                        >
                                            <span className="ml-2">{meal.icon}</span>
                                            {meal.name}
                                        </button>
                                    ))}
                                </div>

                                {/* Filter by Cook */}
                                <div className="flex items-center gap-2 overflow-x-auto no-scrollbar px-1">
                                    <span className="text-[10px] font-black text-purple-400 whitespace-nowrap">סננון לפי מבשלת:</span>
                                    <button 
                                        onClick={() => setCookFilter(null)}
                                        className={`px-3 py-1 rounded-full text-[10px] font-bold transition-all ${!cookFilter ? 'bg-purple-600 text-white' : 'bg-purple-100 text-purple-600'}`}
                                    >
                                        הכל
                                    </button>
                                    {[...new Set(mealsData.map(m => m.who).filter(Boolean))].map(cook => (
                                        <button 
                                            key={cook}
                                            onClick={() => setCookFilter(cook)}
                                            className={`px-3 py-1 rounded-full text-[10px] font-bold transition-all ${cookFilter === cook ? 'bg-purple-600 text-white' : 'bg-purple-100 text-purple-600'}`}
                                        >
                                            {cook}
                                        </button>
                                    ))}
                                </div>

                                <div className="glass-card rounded-[2.5rem] p-8 border border-white">
                                    <div className="flex items-center justify-between mb-8">
                                        <div>
                                            <h2 className="text-xl font-black text-purple-950">התפריט המפנק 🍽️</h2>
                                            <p className="text-xs text-purple-400 font-bold mt-1">מה נבשל היום? (אל תשכחו קינוח!)</p>
                                        </div>
                                        <div className="h-2 w-16 bg-purple-100 rounded-full"></div>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        {mealsData
                                            .filter(item => item.mealId === selectedMeal)
                                            .filter(item => !cookFilter || item.who === cookFilter)
                                            .map(item => (
                                            <div key={item.id} className="group flex items-center justify-between p-4 bg-white/50 hover:bg-white rounded-2xl border border-purple-50 hover:border-purple-200 transition-all shadow-sm">
                                                <div className="flex flex-col">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-2 h-2 rounded-full bg-purple-400"></div>
                                                        <span className="font-bold text-purple-900">{item.dish}</span>
                                                    </div>
                                                    {item.who && (
                                                        <div className="text-[10px] font-bold text-purple-400 flex items-center gap-1 mt-1 mr-5">
                                                            <ChefHat size={10} /> {item.who}
                                                        </div>
                                                    )}
                                                </div>
                                                <button onClick={() => deleteItem('meals', item.id)} className="opacity-0 group-hover:opacity-100 text-purple-200 hover:text-red-400 transition-all p-1">
                                                    <Trash2 size={18} />
                                                </button>
                                            </div>
                                        ))}
                                        
                                        <form className="mt-8 space-y-3" onSubmit={(e) => {
                                            e.preventDefault();
                                            const dish = e.target.dish.value;
                                            const who = e.target.who.value;
                                            if (dish) {
                                                addItem('meals', { mealId: selectedMeal, dish, who });
                                                e.target.reset();
                                            }
                                        }}>
                                            <input 
                                                name="dish" 
                                                placeholder="מה נבשל לסעודה הזו?" 
                                                className="w-full bg-white/50 border-2 border-purple-50 rounded-2xl px-5 py-4 text-sm focus:ring-4 focus:ring-purple-100 focus:border-purple-200 transition-all outline-none"
                                            />
                                            <div className="flex gap-3">
                                                <input 
                                                    name="who" 
                                                    placeholder="מי המבשלת?" 
                                                    className="flex-1 bg-white/50 border-2 border-purple-50 rounded-2xl px-5 py-4 text-sm focus:ring-4 focus:ring-purple-100 focus:border-purple-200 transition-all outline-none"
                                                />
                                                <button type="submit" className="purple-gradient text-white p-4 rounded-2xl shadow-lg hover:scale-105 transition-all active:scale-95">
                                                    <Plus size={24} strokeWidth={3} />
                                                </button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'shopping' && (
                            <div className="space-y-5 animate-in">
                                <div className="flex justify-between items-end px-2">
                                    <div>
                                        <h2 className="text-3xl font-black text-purple-950">רשימת קניות 🛒</h2>
                                        <p className="text-sm text-purple-400 font-bold">לא לשכוח גבינות צהובות! 🧀</p>
                                    </div>
                                    <div className="bg-purple-100 text-purple-600 px-3 py-1 rounded-full text-xs font-black">
                                        {shoppingList.length} מוצרים
                                    </div>
                                </div>

                                <div className="glass-card rounded-[2.5rem] border border-white overflow-hidden">
                                    {shoppingList.length === 0 ? (
                                        <div className="p-16 text-center">
                                            <div className="text-5xl mb-4">🛒</div>
                                            <p className="text-purple-300 font-black text-lg">הרשימה ריקה!</p>
                                            <p className="text-purple-200 text-sm mt-1">אולי הפעם לא נאכל כלום? 😉</p>
                                        </div>
                                    ) : (
                                        <div className="divide-y divide-purple-50">
                                            {shoppingList.map(item => (
                                                <div key={item.id} className="flex items-center justify-between p-6 hover:bg-white/50 transition-colors">
                                                    <div className="flex items-center gap-4 cursor-pointer flex-1" onClick={() => toggleItem('shopping', item.id, item.completed)}>
                                                        <div className={`w-8 h-8 rounded-2xl border-2 flex items-center justify-center transition-all ${
                                                            item.completed ? 'purple-gradient border-transparent text-white scale-90' : 'border-purple-100 bg-white text-transparent'
                                                        }`}>
                                                            <CheckCircle2 size={18} strokeWidth={3} />
                                                        </div>
                                                        <span className={`text-lg font-bold transition-all ${item.completed ? 'line-through text-purple-200 opacity-70' : 'text-purple-900'}`}>
                                                            {item.text}
                                                        </span>
                                                    </div>
                                                    <button onClick={() => deleteItem('shopping', item.id)} className="text-purple-200 hover:text-red-400 p-2 transition-colors">
                                                        <Trash2 size={20} />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <form className="flex gap-3" onSubmit={(e) => {
                                    e.preventDefault();
                                    const val = e.target.item.value;
                                    if (val) {
                                        addItem('shopping', { text: val, completed: false });
                                        e.target.reset();
                                    }
                                }}>
                                    <input name="item" placeholder="להוסיף מוצר לרשימה..." className="flex-1 bg-white shadow-xl shadow-purple-100/20 border-2 border-transparent focus:border-purple-200 rounded-[1.5rem] px-6 py-5 text-sm outline-none transition-all" />
                                    <button type="submit" className="purple-gradient text-white px-7 rounded-[1.5rem] shadow-lg hover:scale-105 active:scale-95 transition-all">
                                        <Plus size={28} strokeWidth={3} />
                                    </button>
                                </form>
                            </div>
                        )}

                        {activeTab === 'bring' && (
                            <div className="space-y-5 animate-in">
                                <div className="px-2">
                                    <h2 className="text-3xl font-black text-purple-950">מה מביאים? 📦</h2>
                                    <p className="text-sm text-purple-400 font-bold">דברים שמגיעים מבחוץ (או מהבוידעם)</p>
                                </div>
                                
                                <div className="grid gap-4 sm:grid-cols-2">
                                    {bringList.length === 0 ? (
                                        <div className="sm:col-span-2 glass-card p-16 rounded-[2.5rem] text-center text-purple-200">
                                            <PackageCheck size={64} className="mx-auto mb-4 opacity-30" />
                                            <p className="font-black text-xl">אף אחת לא מביאה כלום?</p>
                                            <p className="text-sm mt-1 italic">זה הזמן להתנדב!</p>
                                        </div>
                                    ) : (
                                        bringList.map(item => (
                                            <div key={item.id} className="glass-card p-5 rounded-[2rem] flex flex-col justify-between relative group hover:scale-[1.02] transition-all">
                                                <button onClick={() => deleteItem('bring', item.id)} className="absolute top-4 left-4 opacity-0 group-hover:opacity-100 text-purple-200 hover:text-red-400 p-1">
                                                    <Trash2 size={16} />
                                                </button>
                                                <div className="mb-4">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className={`font-black text-lg ${item.completed ? 'text-purple-300 line-through' : 'text-purple-950'}`}>{item.text}</span>
                                                        {item.completed && <div className="bg-green-100 text-green-600 p-1 rounded-full"><CheckCircle2 size={12} strokeWidth={3} /></div>}
                                                    </div>
                                                    <div className="flex items-center gap-1.5 text-xs font-bold text-purple-400">
                                                        <Users size={12} />
                                                        <span>{item.who || 'מישהי?'}</span>
                                                    </div>
                                                </div>
                                                <button 
                                                    onClick={() => toggleItem('bring', item.id, item.completed)}
                                                    className={`w-full py-2.5 rounded-xl text-xs font-black transition-all ${
                                                        item.completed 
                                                        ? 'bg-green-50 text-green-600' 
                                                        : 'bg-purple-100 text-purple-600 hover:bg-purple-200'
                                                    }`}
                                                >
                                                    {item.completed ? 'הגיע ליעדו! 🎉' : 'סמנו כשהגיע ✅'}
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>

                                <div className="glass-card p-8 rounded-[2.5rem] border-2 border-white mt-8">
                                    <h3 className="font-black text-purple-900 mb-4 flex items-center gap-2">
                                        <Smile size={18} className="text-yellow-500" />
                                        להוסיף משהו לרשימת ה"הבאה"?
                                    </h3>
                                    <form className="space-y-3" onSubmit={(e) => {
                                        e.preventDefault();
                                        const text = e.target.text.value;
                                        const who = e.target.who.value;
                                        if (text) {
                                            addItem('bring', { text, who, completed: false });
                                            e.target.reset();
                                        }
                                    }}>
                                        <input name="text" placeholder="מה להביא? (למשל: יין משובח, כסאות)" className="w-full bg-white/50 border-2 border-purple-50 rounded-2xl px-5 py-4 text-sm outline-none focus:border-purple-200 transition-all" />
                                        <div className="flex gap-3">
                                            <input name="who" placeholder="מי האחראית?" className="flex-1 bg-white/50 border-2 border-purple-50 rounded-2xl px-5 py-4 text-sm outline-none focus:border-purple-200 transition-all" />
                                            <button type="submit" className="purple-gradient text-white px-8 rounded-2xl font-black shadow-lg hover:scale-105 active:scale-95 transition-all">הוספה</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {activeTab === 'recipes' && (
                            <div className="space-y-8 animate-in">
                                <div className="px-2">
                                    <h2 className="text-3xl font-black text-purple-950">סודות מהמטבח 🧑‍🍳</h2>
                                    <p className="text-sm text-purple-400 font-bold">המתכונים שאסור לגלות לאף אחת...</p>
                                </div>
                                <div className="grid gap-6">
                                    {recipes.map(recipe => (
                                        <div key={recipe.id} className="glass-card rounded-[2.5rem] p-8 relative group hover:shadow-2xl transition-all border border-white">
                                            <button onClick={() => deleteItem('recipes', recipe.id)} className="absolute top-8 left-8 opacity-0 group-hover:opacity-100 text-purple-200 hover:text-red-400 transition-all">
                                                <Trash2 size={20} />
                                            </button>
                                            <div className="flex items-center gap-4 mb-6">
                                                <div className="bg-pink-100 p-3 rounded-2xl text-pink-500">
                                                    <ChefHat size={24} />
                                                </div>
                                                <h3 className="font-black text-2xl text-purple-950">{recipe.title}</h3>
                                            </div>
                                            <div className="bg-white/40 rounded-3xl p-6 text-sm text-purple-900 leading-relaxed whitespace-pre-line border border-purple-50/50 italic">
                                                {recipe.ingredients}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="purple-gradient p-10 rounded-[3rem] text-white shadow-2xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-4 opacity-10 text-9xl">🍳</div>
                                    <h3 className="font-black text-2xl mb-6 flex items-center gap-2">
                                        <Plus className="bg-white/20 rounded-full p-1" size={24} />
                                        מתכון חדש לאוסף
                                    </h3>
                                    <form className="space-y-4" onSubmit={(e) => {
                                        e.preventDefault();
                                        const title = e.target.title.value;
                                        const ing = e.target.ingredients.value;
                                        if (title) {
                                            addItem('recipes', { title, ingredients: ing });
                                            e.target.reset();
                                        }
                                    }}>
                                        <input name="title" placeholder="איך קוראים למנה?" className="w-full bg-white/10 border-2 border-white/20 rounded-2xl px-6 py-4 text-white placeholder-white/60 outline-none focus:bg-white/20 transition-all" />
                                        <textarea name="ingredients" placeholder="איך מכינים? (מצרכים, הוראות, וקצת אהבה...)" className="w-full bg-white/10 border-2 border-white/20 rounded-2xl px-6 py-4 text-white h-32 placeholder-white/60 outline-none focus:bg-white/20 transition-all" />
                                        <button type="submit" className="w-full bg-white text-purple-700 py-5 rounded-2xl font-black text-lg shadow-xl hover:scale-[1.02] active:scale-95 transition-all">
                                            שמירת המתכון המנצח 🏆
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {activeTab === 'tasks' && (
                            <div className="space-y-8 animate-in">
                                <div className="px-2">
                                    <h2 className="text-3xl font-black text-purple-950">חלוקת עבודה 📋</h2>
                                    <p className="text-sm text-purple-400 font-bold">אף אחת לא יושבת בחיבוק ידיים! 😉</p>
                                </div>
                                <div className="space-y-4">
                                    {tasks.map(task => (
                                        <div key={task.id} className="glass-card p-6 rounded-[2rem] flex justify-between items-center group border-r-8 border-purple-500 hover:translate-x-[-4px] transition-all">
                                            <div>
                                                <h4 className="font-black text-purple-950 text-xl mb-2">{task.what}</h4>
                                                <div className="flex flex-wrap gap-3">
                                                    <div className="flex items-center gap-1.5 text-xs font-black text-purple-500 bg-purple-100/50 px-3 py-1.5 rounded-full">
                                                        <Users size={14} /> {task.who}
                                                    </div>
                                                    <div className="flex items-center gap-1.5 text-xs font-black text-indigo-500 bg-indigo-100/50 px-3 py-1.5 rounded-full">
                                                        <Clock size={14} /> {task.when}
                                                    </div>
                                                </div>
                                            </div>
                                            <button onClick={() => deleteItem('tasks', task.id)} className="opacity-0 group-hover:opacity-100 text-purple-200 hover:text-red-400 p-2">
                                                <Trash2 size={20} />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                                <div className="bg-white border-4 border-dashed border-purple-100 p-10 rounded-[3rem] text-center">
                                    <h3 className="font-black text-purple-950 text-xl mb-6">מי עושה מה?</h3>
                                    <form className="space-y-4" onSubmit={(e) => {
                                        e.preventDefault();
                                        const { what, who, when } = e.target;
                                        if (what.value && who.value) {
                                            addItem('tasks', { what: what.value, who: who.value, when: when.value });
                                            e.target.reset();
                                        }
                                    }}>
                                        <input name="what" placeholder="מה המשימה?" className="w-full bg-purple-50/50 border-2 border-transparent focus:border-purple-200 rounded-2xl px-6 py-4 text-sm outline-none transition-all" />
                                        <div className="flex gap-3">
                                            <input name="who" placeholder="מי האחראית?" className="flex-1 bg-purple-50/50 border-2 border-transparent focus:border-purple-200 rounded-2xl px-6 py-4 text-sm outline-none transition-all" />
                                            <input name="when" placeholder="מתי?" className="flex-1 bg-purple-50/50 border-2 border-transparent focus:border-purple-200 rounded-2xl px-6 py-4 text-sm outline-none transition-all" />
                                        </div>
                                        <button type="submit" className="w-full purple-gradient text-white py-5 rounded-2xl font-black shadow-lg hover:scale-[1.02] active:scale-95 transition-all mt-4">
                                            הוספת משימה לביצוע 💪
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navigation Bar - Floating Island Style */}
                    <nav className="fixed bottom-8 left-6 right-6 max-w-xl mx-auto z-30">
                        <div className="tab-island h-22 rounded-[2.5rem] border border-white flex justify-around items-center px-4 py-2">
                            <TabButton id="meals" label="תפריט" icon={Utensils} />
                            <TabButton id="bring" label="מביאים" icon={PackageCheck} />
                            <TabButton id="recipes" label="מתכונים" icon={BookOpen} />
                            <TabButton id="shopping" label="קניות" icon={ShoppingCart} />
                            <TabButton id="tasks" label="עבודה" icon={Users} />
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
